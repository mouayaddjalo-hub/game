<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="文字冒险" />
    <meta name="theme-color" content="#fffafd" />
    <title>文字冒险</title>
    <!-- mobile-single-file-build: 2026-06-30 -->
    <style>:root {
  --bg: #fffafd;
  --surface: #ffffff;
  --surface-strong: #fff2f8;
  --pink: #ff6fae;
  --pink-deep: #e94f94;
  --pink-soft: #ffd4e6;
  --ink: #332731;
  --muted: #766875;
  --line: #f4bfd6;
  --shadow: 0 14px 34px rgba(232, 88, 151, 0.15);
  --small-shadow: 0 8px 18px rgba(232, 88, 151, 0.16);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
  width: 100%;
  overscroll-behavior: none;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Arial Rounded MT Bold", "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
  font-size: 16px;
  font-style: normal;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
  transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: var(--small-shadow);
}

textarea,
input,
select {
  width: 100%;
  border: 2px solid var(--line);
  border-radius: 14px;
  background: #fff;
  color: var(--ink);
  outline: none;
  padding: 12px 14px;
}

textarea:focus,
input:focus,
select:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 4px rgba(255, 111, 174, 0.14);
}

textarea {
  resize: vertical;
  line-height: 1.75;
}

.app-shell {
  min-height: 100vh;
  display: flex;
  background: linear-gradient(180deg, #fffafd 0%, #ffffff 46%, #fff7fb 100%);
}

.chat-screen {
  width: 100%;
  min-width: 0;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 16px;
  padding: calc(10px + env(safe-area-inset-top)) 14px 10px 62px;
  background: rgba(255, 250, 253, 0.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(14px);
}

.brand {
  display: none;
}

.topbar-actions {
  display: flex;
  gap: 10px;
}

.icon-text-button,
.send-button,
.small-button {
  background: var(--pink);
  color: #fff;
  border-radius: 999px;
  padding: 10px 18px;
  box-shadow: 0 6px 12px rgba(255, 111, 174, 0.2);
}

.ghost-button {
  background: #fff;
  color: var(--pink-deep);
  border: 2px solid var(--pink-soft);
  border-radius: 999px;
  padding: 9px 16px;
}

.danger-button {
  background: #fff0f2;
  color: #c81f4a;
  border: 2px solid #ffbac8;
  border-radius: 999px;
  padding: 10px 18px;
}

.round-button {
  flex: 0 0 46px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #fff;
  color: var(--pink-deep);
  border: 2px solid var(--pink);
  font-size: 26px;
  line-height: 1;
}

.chat-log {
  flex: 1;
  width: calc(100% - 12px);
  max-width: 920px;
  margin: 0 auto;
  padding: calc(74px + env(safe-area-inset-top)) 0 calc(108px + env(safe-area-inset-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.empty-state {
  margin: 8vh auto 0;
  max-width: 680px;
  padding: 24px;
  border: 2px solid var(--pink-soft);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow);
  line-height: 1.8;
  color: var(--muted);
}

.message {
  margin: 0 0 18px;
}

.message.player {
  display: flex;
  justify-content: flex-end;
}

.player-bubble {
  max-width: min(78%, 680px);
  background: var(--surface-strong);
  border: 2px solid var(--pink-soft);
  border-radius: 18px 18px 6px 18px;
  padding: 14px 16px;
  box-shadow: 0 8px 22px rgba(255, 111, 174, 0.12);
}

.player-text {
  line-height: 1.75;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.ai-card {
  max-width: 100%;
  background: var(--surface);
  border: 2px solid #f8d5e4;
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 10px 24px rgba(131, 73, 105, 0.09);
}

.env-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 10px 12px;
  background: linear-gradient(90deg, #fff2f8, #ffffff);
  border: 2px solid var(--pink-soft);
  border-radius: 16px;
  color: var(--pink-deep);
}

.env-strip span {
  padding: 4px 8px;
  background: #fff;
  border-radius: 999px;
  border: 1px solid #ffe1ed;
}

.story-body {
  padding: 16px 4px 6px;
}

.story-body p {
  margin: 0 0 18px;
  line-height: 1.9;
  overflow-wrap: anywhere;
}

.typing-indicator {
  color: var(--pink-deep);
}

.typing-indicator::after {
  content: "...";
  display: inline-block;
  width: 1.8em;
  text-align: left;
  animation: typingPulse 1.2s ease-in-out infinite;
}

.error-text {
  color: #c81f4a;
  background: #fff4f6;
  border: 1px dashed #ffb9cd;
  border-radius: 14px;
  padding: 10px 12px;
}

@keyframes typingPulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}

.dialogue-box {
  margin: 2px 0 18px;
  padding: 13px 15px;
  border: 2px solid var(--pink-soft);
  border-radius: 16px;
  background: #fff8fb;
}

.dialogue-speaker {
  display: block;
  color: var(--pink-deep);
  margin-bottom: 8px;
}

.dialogue-text {
  line-height: 1.8;
}

.button-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding-top: 8px;
  border-top: 1px solid #fae0eb;
}

.message-action {
  background: #fff;
  color: var(--pink-deep);
  border: 2px solid var(--pink-soft);
  border-radius: 999px;
  padding: 7px 13px;
}

.input-bar {
  position: fixed;
  z-index: 30;
  left: 50%;
  bottom: max(10px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  width: calc(100% - 12px);
  max-width: 940px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 12px;
  border: 2px solid var(--pink-soft);
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: var(--shadow);
}

.input-bar textarea {
  min-height: 46px;
  max-height: 160px;
  resize: none;
  border-radius: 16px;
  line-height: 1.55;
}

.side-drawer {
  position: fixed;
  z-index: 60;
  left: 0;
  top: 50%;
  width: 104px;
  height: 174px;
  transform: translate(calc(-100% + 34px + var(--drag-x, 0px)), -50%);
  transition: transform 220ms ease;
  overflow: visible;
  touch-action: pan-y;
}

.side-drawer.open {
  transform: translate(0, -50%);
}

.side-drawer.dragging {
  transition: none;
}

.drawer-tab {
  position: absolute;
  top: 50%;
  right: -18px;
  width: 36px;
  height: 86px;
  transform: translateY(-50%);
  border-radius: 0 18px 18px 0;
  background: var(--pink);
  color: #fff;
  box-shadow: var(--small-shadow);
  display: grid;
  place-items: center;
  padding: 0;
  font-size: 0;
  touch-action: none;
}

.drawer-tab::before {
  content: "";
  width: 7px;
  height: 38px;
  border-left: 3px solid rgba(255, 255, 255, 0.86);
  border-right: 3px solid rgba(255, 255, 255, 0.86);
  border-radius: 999px;
}

.sidebar-icons {
  width: 72px;
  min-height: 174px;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 12px;
  padding: 12px 10px 12px 8px;
  border: 2px solid var(--pink-soft);
  border-left: 0;
  border-radius: 0 24px 24px 0;
  background: rgba(255, 255, 255, 0.92);
  box-shadow: 14px 0 34px rgba(232, 88, 151, 0.15);
  opacity: 0;
  pointer-events: none;
  transform: translateX(-10px) scale(0.96);
  transition: opacity 180ms ease, transform 180ms ease;
  backdrop-filter: blur(12px);
}

.side-drawer.open .sidebar-icons {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0) scale(1);
}

.sidebar-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: #fff;
  color: var(--pink-deep);
  border: 2px solid var(--pink-soft);
  box-shadow: 0 8px 18px rgba(232, 88, 151, 0.15);
}

.sidebar-icon.active {
  background: var(--pink);
  color: #fff;
  border-color: var(--pink);
}

.sidebar-icon svg {
  width: 24px;
  height: 24px;
  stroke: currentColor;
  stroke-width: 2.4;
  fill: none;
}

.sidebar-content {
  position: absolute;
  left: 78px;
  top: 50%;
  width: min(76vw, 330px);
  max-height: min(62vh, calc(100vh - 210px - env(safe-area-inset-top) - env(safe-area-inset-bottom)));
  max-height: min(62dvh, calc(100dvh - 210px - env(safe-area-inset-top) - env(safe-area-inset-bottom)));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
  background: #fff;
  border: 2px solid var(--pink-soft);
  border-radius: 20px;
  box-shadow: var(--shadow);
  opacity: 0;
  pointer-events: none;
  transform: translate(-12px, -50%) scale(0.98);
  transition: opacity 180ms ease, transform 180ms ease;
}

.side-drawer.panel-open .sidebar-content {
  opacity: 1;
  pointer-events: auto;
  transform: translate(0, -50%) scale(1);
}

.sidebar-content h2 {
  margin: 0 0 12px;
  color: var(--pink-deep);
  font-size: 18px;
}

.panel {
  margin-bottom: 16px;
}

.round-group {
  margin-bottom: 14px;
}

.round-group h3 {
  margin: 0 0 8px;
  padding: 6px 10px;
  color: var(--muted);
  font-size: 13px;
  background: #fff5fa;
  border: 1px solid #ffe1ed;
  border-radius: 999px;
}

.panel h2,
.large-box h2,
.settings-band h2,
.modal h2,
.page-header h1 {
  margin: 0 0 12px;
  color: var(--pink-deep);
  font-size: 22px;
}

.character-card,
.relation-card,
.memory-item,
.npc-card {
  padding: 13px;
  margin-bottom: 10px;
  background: #fffafd;
  border: 2px solid #f8d5e4;
  border-radius: 14px;
  line-height: 1.7;
}

.character-card div,
.relation-card div {
  margin-bottom: 5px;
}

.modal-backdrop,
.page-layer {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(48, 35, 45, 0.26);
  display: grid;
  place-items: center;
  padding: 18px;
}

.hidden {
  display: none !important;
}

.modal {
  width: min(620px, 100%);
  background: #fff;
  border: 2px solid var(--pink-soft);
  border-radius: 22px;
  padding: 20px;
  box-shadow: var(--shadow);
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 14px;
}

.confirm-modal p {
  line-height: 1.8;
  color: var(--muted);
}

.page-layer {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.page-header {
  position: sticky;
  top: 0;
  z-index: 5;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: rgba(255, 250, 253, 0.94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(14px);
}

.page-header h1 {
  text-align: center;
  margin: 0;
}

.home-grid {
  width: calc(100% - 28px);
  max-width: 1120px;
  margin: 22px auto;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.large-box,
.settings-band {
  background: #fff;
  border: 2px solid var(--pink-soft);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 10px 24px rgba(255, 111, 174, 0.09);
}

.sub-box {
  margin-bottom: 16px;
}

.section-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.section-title-row h2 {
  margin-bottom: 0;
}

.sub-box h3,
.npc-editor h3 {
  margin: 0 0 10px;
  color: var(--ink);
  font-size: 18px;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 8px;
}

.npc-editor-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.npc-card {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
  gap: 8px;
}

.npc-card textarea {
  grid-column: 1 / -1;
}

.settings-band {
  width: calc(100% - 28px);
  max-width: 1120px;
  margin: 0 auto 26px;
}

.settings-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.settings-grid label {
  display: grid;
  gap: 7px;
  color: var(--muted);
}

.api-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.api-status {
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  padding: 5px 10px;
  color: var(--muted);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.72);
}

.api-status[data-tone="ok"] {
  color: #2d8a55;
  border: 1px dashed rgba(45, 138, 85, 0.35);
}

.api-status[data-tone="error"] {
  color: #c81f4a;
  border: 1px dashed rgba(200, 31, 74, 0.35);
}

.archive-note {
  margin: 14px 0;
  color: var(--muted);
}

.memory-list {
  width: calc(100% - 28px);
  max-width: 860px;
  margin: 20px auto 96px;
}

.memory-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px;
  align-items: start;
}

.memory-item input {
  width: 18px;
  height: 18px;
  margin-top: 6px;
  accent-color: var(--pink);
}

.memory-type {
  color: var(--pink-deep);
  margin-bottom: 5px;
}

.memory-footer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  padding: 12px;
  background: rgba(255, 250, 253, 0.92);
  border-top: 1px solid var(--line);
}

@media (max-width: 820px) {
  .home-grid,
  .settings-grid {
    grid-template-columns: 1fr;
  }

  .topbar {
    padding-left: 58px;
  }

  .player-bubble {
    max-width: 92%;
  }

  .npc-card {
    grid-template-columns: 1fr;
  }

  .profile-grid {
    grid-template-columns: 1fr;
  }
}

.sidebar-content {
  position: absolute !important;
  left: 78px !important;
  top: 50% !important;
  transform: translate(-12px, -50%) scale(0.98) !important;
  max-height: min(62vh, calc(100vh - 210px - env(safe-area-inset-top) - env(safe-area-inset-bottom))) !important;
  max-height: min(62dvh, calc(100dvh - 210px - env(safe-area-inset-top) - env(safe-area-inset-bottom))) !important;
}

.side-drawer.panel-open .sidebar-content {
  transform: translate(0, -50%) scale(1) !important;
}

@media (max-width: 540px) {
  .sidebar-content {
    left: 68px !important;
    top: 50% !important;
    max-height: min(58vh, calc(100vh - 230px - env(safe-area-inset-top) - env(safe-area-inset-bottom))) !important;
    max-height: min(58dvh, calc(100dvh - 230px - env(safe-area-inset-top) - env(safe-area-inset-bottom))) !important;
  }
}

@media (max-width: 540px) {

  }

  actionConfirmCancel: document.getElementById("actionConfirmCancel"),
  actionConfirmOk: document.getElementById("actionConfirmOk"),
  editModal: document.getElementById("editModal"),
  editTitle: document.getElementById("editTitle"),
  editInput: document.getElementById("editInput"),
  editCancel: document.getElementById("editCancel"),
  editSave: document.getElementById("editSave")
};

function uid(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return saved ? migrateState({ ...clone(defaultState), ...saved }) : clone(defaultState);
  } catch {
    return clone(defaultState);
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function migrateState(next) {
  next.settings = { ...clone(defaultState.settings), ...(next.settings || {}) };
  if (typeof next.settings.player === "string") {
    next.settings.player = { name: "", gender: "", age: "", detail: next.settings.player };
  } else {
    next.settings.player = { name: "", gender: "", age: "", detail: "", ...(next.settings.player || {}) };
  }
  next.settings.npcs = Array.isArray(next.settings.npcs) ? next.settings.npcs : [];
  next.settings.apiModels = Array.isArray(next.settings.apiModels) ? next.settings.apiModels : [];
  next.events = Array.isArray(next.events) ? next.events : [];
  next.snapshots = Array.isArray(next.snapshots) ? next.snapshots : [];
  next.selectedMemories = Array.isArray(next.selectedMemories) ? next.selectedMemories : [];
  const originalLength = next.events.length;
  next.events = next.events.filter((event) => !isLegacyLocalFallbackEvent(event));
  if (next.events.length !== originalLength) {
    next.snapshots = [];
    next.selectedMemories = [];
  }
  return next;
}

function isLegacyLocalFallbackEvent(event) {
  if (!event || event.type !== "ai" || event.status === "loading") return false;
  const blocks = Array.isArray(event.story?.blocks) ? event.story.blocks : [];
  const text = blocks.map((block) => block?.text || "").join("\n");
  return [
    "新的行动信息进入场景后",
    "世界设定中的规则在暗处稳定地发挥作用",
    "没有替你做出任何决定",
    "一处不起眼的痕迹被",
    "主控推动了剧情："
  ].some((phrase) => text.includes(phrase));
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function latestSnapshot() {
  return state.snapshots[state.snapshots.length - 1] || buildInitialSnapshot();
}

function buildInitialSnapshot() {
  return {
    env: { time: "傍晚", place: "未命名的起点", weather: "微风" },
    statuses: [],
    relations: [],
    memories: { instant: [], long: [] },
    seed: 1
  };
}

function renderAll() {
  renderChat();
  renderSidebar();
  renderHome();
  renderMemoryPage();
  saveState();
}

function renderChat() {
  els.chatLog.innerHTML = "";
  if (!state.events.length) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "从底部输入第一句话开始冒险。AI 会保持三段式输出，并把人物状态、关系和记忆同步刷新。";
    els.chatLog.appendChild(empty);
    return;
  }

  state.events.forEach((event) => {
    const node = event.type === "player" ? renderPlayerMessage(event) : renderAiMessage(event);
    els.chatLog.appendChild(node);
  });
  requestAnimationFrame(() => {
    els.chatLog.scrollTop = els.chatLog.scrollHeight;
  });
}

function renderPlayerMessage(event) {
  const wrapper = document.createElement("article");
  wrapper.className = "message player";
  wrapper.dataset.id = event.id;
  wrapper.innerHTML = `
    <div class="player-bubble">
      <div class="player-text">${escapeHtml(event.text)}</div>
      <div class="button-row">
        <button class="message-action" data-action="delete-player" data-id="${event.id}" type="button">删除</button>
        <button class="message-action" data-action="edit-player" data-id="${event.id}" type="button">修改</button>
      </div>
    </div>
  `;
  return wrapper;
}

function renderAiMessage(event) {
  const wrapper = document.createElement("article");
  wrapper.className = "message ai";
  wrapper.dataset.id = event.id;
  const isLoading = event.status === "loading";
  const isError = event.status === "error";
  const story = event.story || {
    env: isError
      ? { time: "生成失败", place: "API 连接", weather: "错误" }
      : { time: "生成中", place: "剧情引擎", weather: "等待" },
    blocks: []
  };
  const storyHtml = isLoading
    ? `<p class="typing-indicator">${escapeHtml(event.streamText || "正在输入中……")}</p>`
    : isError
      ? `<p class="error-text">${escapeHtml(event.errorMessage || "生成失败，请检查 API 设置。")}</p>`
      : story.blocks
    .map((block) => {
      if (block.type === "dialogue") {
        return `
          <div class="dialogue-box">
            <span class="dialogue-speaker">对话方框 - ${escapeHtml(block.speaker)}</span>
            <div class="dialogue-text">"${escapeHtml(block.text)}"</div>
          </div>
        `;
      }
      return `<p>${escapeHtml(block.text)}</p>`;
    })
    .join("");

  wrapper.innerHTML = `
    <div class="ai-card">
      <div class="env-strip">
        <span>时间：${escapeHtml(story.env.time)}</span>
        <span>地点：${escapeHtml(story.env.place)}</span>
        <span>天气：${escapeHtml(story.env.weather)}</span>
      </div>
      <div class="story-body">${storyHtml}</div>
      <div class="button-row">
        <button class="message-action" data-action="delete-ai" data-id="${event.id}" type="button">删除</button>
        ${isLoading ? "" : `<button class="message-action" data-action="reroll-ai" data-id="${event.id}" type="button">重说</button>`}
        ${isLoading || isError ? "" : `<button class="message-action" data-action="edit-ai" data-id="${event.id}" type="button">修改</button>`}
      </div>
    </div>
  `;
  return wrapper;
}

function renderSidebar() {
  const mode = state.sidebarMode || "status";
  els.sideDrawer.dataset.mode = mode;
  els.sidebarPanelTitle.textContent = mode === "status" ? "在场人物状态" : "已解锁人物关系";
  els.statusModeButton.classList.toggle("active", mode === "status");
  els.relationModeButton.classList.toggle("active", mode === "relation");
  els.statusList.classList.toggle("hidden", mode !== "status");
  els.relationList.classList.toggle("hidden", mode !== "relation");
  const rounds = getTimelineRounds();

  els.statusList.innerHTML = "";
  if (!rounds.some((round) => round.statuses.length)) {
    els.statusList.innerHTML = `<div class="character-card">暂无在场人物。添加主要 NPC 或开始剧情后会自动刷新。</div>`;
  } else {
    rounds.forEach((round) => {
      if (!round.statuses.length) return;
      const group = document.createElement("section");
      group.className = "round-group";
      group.innerHTML = `<h3>${escapeHtml(round.label)}</h3>`;
      round.statuses.forEach((person) => {
        const card = document.createElement("article");
        card.className = "character-card";
        card.innerHTML = `
          <div>姓名：${escapeHtml(person.name)}</div>
          <div>年龄：${escapeHtml(person.age)}</div>
          <div>外形：${escapeHtml(person.appearance || "外形细节仍在当前光线里逐步清晰。")}</div>
          <div>体位（姿势）：${escapeHtml(person.posture || "停在便于观察局势的位置。")}</div>
          <div>内心想法：${escapeHtml(ensureLongThought(person.thought, person.name))}</div>
          <div>对“你”印象：${escapeHtml(person.impression || "仍在观察你的意图与边界。")}</div>
        `;
        group.appendChild(card);
      });
      els.statusList.appendChild(group);
    });
  }

  els.relationList.innerHTML = "";
  if (!rounds.some((round) => round.relations.length)) {
    els.relationList.innerHTML = `<div class="relation-card">暂无已解锁关系。</div>`;
  } else {
    rounds.forEach((round) => {
      if (!round.relations.length) return;
      const group = document.createElement("section");
      group.className = "round-group";
      group.innerHTML = `<h3>${escapeHtml(round.label)}</h3>`;
      round.relations.forEach((rel) => {
        const card = document.createElement("article");
        card.className = "relation-card";
        card.innerHTML = `
          <div>人物：${escapeHtml(rel.name)}</div>
          <div>关系：${escapeHtml(rel.description)}</div>
          <div>好感度：${escapeHtml(rel.affection)}</div>
        `;
        group.appendChild(card);
      });
      els.relationList.appendChild(group);
    });
  }
}

function getTimelineRounds() {
  if (!state.snapshots.length) {
    const initial = latestSnapshot();
    return [{ label: "当前", statuses: initial.statuses || [], relations: initial.relations || [] }];
  }
  const rounds = [];
  state.snapshots.forEach((snapshot, index) => {
    const event = state.events[index];
    if (!event || (event.type !== "player" && event.type !== "ai" && event.type !== "memoryMerge")) return;
    const label = event.type === "player"
      ? `第 ${rounds.length + 1} 回合：玩家行动`
      : event.type === "ai"
        ? `第 ${rounds.length + 1} 回合：剧情推进`
        : `第 ${rounds.length + 1} 回合：记忆整合`;
    rounds.push({
      label,
      statuses: clone(snapshot.statuses || []),
      relations: clone(snapshot.relations || [])
    });
  });
  return rounds.length ? rounds : [{ label: "当前", statuses: [], relations: [] }];
}

function renderMemoryPage() {
  const snap = latestSnapshot();
  const memories = [
    ...snap.memories.instant.map((memory) => ({ ...memory, type: "instant", label: "即时记忆" })),
    ...snap.memories.long.map((memory) => ({ ...memory, type: "long", label: "长期记忆" }))
  ].filter((memory) => els.memoryFilter.value === "all" || memory.type === els.memoryFilter.value);

  els.memoryList.innerHTML = "";
  if (!memories.length) {
    els.memoryList.innerHTML = `<div class="memory-item"><div></div><div>暂无记忆。</div></div>`;

function ensureLongThought(text, name) {
  const base = text || `${name}正在重新评估眼前局势，试图从主控的行动里判断对方的目的、底线与可信程度。`;
  if (base.length >= 30) return base;
  return `${base} 这份判断仍在变化，新的细节会影响接下来的态度与选择。`;
}

function getPlayerProfile() {
  if (typeof state.settings.player === "string") {
    state.settings.player = { name: "", gender: "", age: "", detail: state.settings.player };
  }
  state.settings.player = { name: "", gender: "", age: "", detail: "", ...(state.settings.player || {}) };
  return state.settings.player;
}

function formatPlayerProfileForPrompt() {
  const player = getPlayerProfile();
  return [
    `姓名：${player.name || "未填写"}`,
    `性别：${player.gender || "未填写"}`,
    `年龄：${player.age || "未填写"}`,
    `其他信息：${player.detail || "未填写"}`,
    "底层规则：主控姓名只用于识别角色，AI 正文必须用第二人称代替主控姓名，不得直呼或机械复述主控姓名。",
    "绝对禁止替主控说话、行动、思考、选择、反应或做决定。"
  ].join("\n");
}

function showApiStatus(text, tone = "neutral") {
  els.apiStatus.textContent = text;
  els.apiStatus.dataset.tone = tone;
}

function saveSection(section) {
  if (section === "world") syncWorldFromInputs();
  if (section === "character") syncCharacterFromInputs();
  if (section === "api") syncApiFromInputs();
  if (section === "all") syncAllSettingsFromInputs();
  rebuildTimeline();
  renderAll();
  if (section === "api") showApiStatus("已保存 API 设置。", "ok");
}

async function submitPlayerText(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  const playerEvent = { id: uid("player"), type: "player", text: trimmed, createdAt: Date.now() };
  state.events.push(playerEvent);
  rebuildTimeline();
  renderAll();
  window.setTimeout(() => {
    const aiEvent = createPendingAiEvent({ source: "player", text: trimmed });
    state.events.push(aiEvent);
    rebuildTimeline();
    renderAll();
    scheduleAiResolution(aiEvent.id);
  }, 80);
}

async function submitDirective(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  const aiEvent = createPendingAiEvent({ source: "directive", text: trimmed });
  state.events.push(aiEvent);
  rebuildTimeline();
  renderAll();
  scheduleAiResolution(aiEvent.id);
}

function scheduleAiResolution(id) {
  window.setTimeout(() => {
    resolveAiEvent(id);
  }, 120);
}

function createPendingAiEvent({ source, text, variant = 0 }) {
  return {
    id: uid("ai"),
    type: "ai",
    source,
    prompt: text,
    variant,
    status: "loading",
    story: {
      env: { time: "生成中", place: "剧情引擎", weather: "等待" },
      blocks: [{ type: "paragraph", text: "正在输入中……" }]
    },
    createdAt: Date.now()
  };
}

async function resolveAiEvent(id) {
  const index = state.events.findIndex((event) => event.id === id);
  const event = state.events[index];
  if (!event || event.type !== "ai") return;
  const previous = index > 0 ? state.snapshots[index - 1] || buildInitialSnapshot() : buildInitialSnapshot();
  const loadingStartedAt = Date.now();
  try {
    const story = await generateStory({
      source: event.source,
      text: event.prompt || "",
      previous,
      variant: event.variant || 0,
      eventId: id
    });
    await keepTypingVisible(loadingStartedAt);
    event.story = story;
    event.status = "done";
    delete event.errorMessage;
  } catch (error) {
    await keepTypingVisible(loadingStartedAt);
    event.status = "error";
    event.errorMessage = formatGenerationError(error);
    event.story = {
      env: { time: "生成失败", place: "API 连接", weather: "错误" },
      blocks: [{ type: "paragraph", text: event.errorMessage }]
    };
  }
  rebuildTimeline();
  renderAll();
}

function keepTypingVisible(startedAt, minimum = 850) {
  const elapsed = Date.now() - startedAt;
  const rest = Math.max(0, minimum - elapsed);
  return new Promise((resolve) => window.setTimeout(resolve, rest));
}

async function generateStory({ source, text, previous, variant, eventId }) {
  if (!state.settings.apiUrl || !state.settings.apiKey || !state.settings.apiModel) {
    throw new Error("请先在主页设置里填写 API URL、密钥和模型，并保存后再生成剧情。");
  }
  return await generateWithApi({ source, text, previous, variant, eventId });
}

async function generateWithApi({ source, text, previous, variant, eventId }) {
  const systemPrompt = [
    "你是 MUYU 风格 AI 文字冒险引擎。",
    "绝对禁止代替玩家角色说话、做动作或做决定；只能描写环境、推动剧情、扮演 NPC。",
    "主控姓名只作为底层角色识别；正文中称呼主控时必须使用第二人称，不能直接写出主控姓名来替代玩家。",
    "返回严格 JSON，不要 Markdown，不要代码块。结构：env{time,place,weather}, blocks 数组，元素为 {type:'paragraph',text} 或 {type:'dialogue',speaker,text}。",
    "剧情正文必须是自然段，不能在一句话中间硬换行。每个 dialogue 只能包含一个角色的一句或一段台词。",
    "dialogue.text 只能写角色真正说出口的话，禁止放入动作描写、心理描写、神态描写或旁白。",
    "人物描写必须读取设定后自然提炼，不能整段照抄。外形要结合当前场景和情绪变化重新描写，NPC 行为要受记忆影响但不能 OOC。",
    `世界设定：${state.settings.world || "未填写"}`,
    `主控设定：${formatPlayerProfileForPrompt()}`,
    `主要 NPC：${JSON.stringify(state.settings.npcs)}`,
    "主要 NPC 是参考资料：不需要立刻全部出场，也不需要每回合都出场；可以自然引入新 NPC 或让场景中人物随机变化。",
    `当前环境：${JSON.stringify(previous.env)}`,
    `当前记忆：${JSON.stringify(previous.memories)}`,
    `生成模式：${source === "directive" ? "剧情发展指令扩写，不写玩家反应" : "回应玩家输入，不越权操控玩家"}`,
    `重说差异种子：${variant}`
  ].join("\n");

  const response = await fetchWithTimeout(state.settings.apiUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${state.settings.apiKey}`
    },
    body: JSON.stringify({
      model: state.settings.apiModel,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: text }
      ],
      temperature: variant ? 0.95 : 0.75,
      stream: true
    })
  }, getApiTimeout());

  if (!response.ok) throw new Error(`API HTTP ${response.status}`);
  const contentType = response.headers.get("content-type") || "";
  let content = "";
  if (response.body && /text\/event-stream|stream/i.test(contentType)) {
    content = await readOpenAiStream(response, eventId);
  } else {
    const data = await response.json();
    content = data.choices?.[0]?.message?.content || data.output_text || "";
    updateStreamingText(eventId, makeStreamingPreview(content) || "正在整理剧情格式……");
  }
  const parsed = parseApiJsonContent(content);
  return normalizeStory(parsed, previous, text, variant);
}

async function readOpenAiStream(response, eventId) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buffer = "";
  let content = "";
  const handleLine = (line) => {
    const trimmed = line.trim();
    if (!trimmed.startsWith("data:")) return;
    const payload = trimmed.slice(5).trim();
    if (!payload || payload === "[DONE]") return;
    try {
      const json = JSON.parse(payload);
      const delta = json.choices?.[0]?.delta?.content
        || json.choices?.[0]?.message?.content
        || json.output_text
        || "";
      if (delta) {
        content += delta;
        updateStreamingText(eventId, makeStreamingPreview(content));
      }
    } catch {
      // Some providers send heartbeat lines or non-JSON keepalive chunks.
    }
  };
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split(/\r?\n/);
    buffer = lines.pop() || "";
    lines.forEach(handleLine);
  }
  if (buffer.trim()) handleLine(buffer);
  updateStreamingText(eventId, makeStreamingPreview(content) || "正在整理剧情格式……");
  return content;
}

function makeStreamingPreview(content) {
  const raw = String(content || "").trim();
  if (!raw) return "";
  try {
    const parsed = parseApiJsonContent(raw);
    return storyToPlainText(parsed);
  } catch {
    const texts = [];
    raw.replace(/"time"\s*:\s*"([^"]*)"/g, (_, value) => {
      texts.push(`时间：${unescapeJsonString(value)}`);
      return "";
    });
    raw.replace(/"place"\s*:\s*"([^"]*)"/g, (_, value) => {
      texts.push(`地点：${unescapeJsonString(value)}`);
      return "";
    });
    raw.replace(/"weather"\s*:\s*"([^"]*)"/g, (_, value) => {
      texts.push(`天气：${unescapeJsonString(value)}`);
      return "";
    });
    raw.replace(/"speaker"\s*:\s*"([^"]*)"[\s\S]{0,80}?"text"\s*:\s*"([^"]*)"/g, (_, speaker, line) => {
      texts.push(`${unescapeJsonString(speaker)}：「${unescapeJsonString(line)}」`);
      return "";
    });
    raw.replace(/"type"\s*:\s*"paragraph"[\s\S]{0,80}?"text"\s*:\s*"([^"]*)"/g, (_, value) => {
      texts.push(unescapeJsonString(value));
      return "";
    });
    return texts.join("\n\n") || raw.replace(/[{}\[\]",]/g, " ").replace(/\s+/g, " ").trim();
  }
}

function storyToPlainText(story) {
  const parts = [];
  if (story?.env) {
    parts.push(`时间：${story.env.time || ""} 地点：${story.env.place || ""} 天气：${story.env.weather || ""}`.trim());
  }
  (story?.blocks || []).forEach((block) => {
    if (block.type === "dialogue") parts.push(`${block.speaker || "NPC"}：「${block.text || ""}」`);
    else if (block.text) parts.push(block.text);
  });
  return parts.filter(Boolean).join("\n\n");
}

function unescapeJsonString(value) {
  try {
    return JSON.parse(`"${String(value).replace(/"/g, '\\"')}"`);
  } catch {
    return value;
  }
}

function updateStreamingText(eventId, text) {
  const event = state.events.find((item) => item.id === eventId);
  if (!event || event.status !== "loading") return;
  event.streamText = text || "正在输入中……";
  renderAll();
}

function parseApiJsonContent(content) {
  const raw = String(content || "").trim();
  if (!raw) throw new Error("API 返回内容为空。");
  const withoutFence = raw
    .replace(/^```(?:json)?\s*/i, "")
    .replace(/\s*```$/i, "")
    .trim();
  try {
    return JSON.parse(withoutFence);
  } catch {
    const start = withoutFence.indexOf("{");
    const end = withoutFence.lastIndexOf("}");
    if (start >= 0 && end > start) {
      return JSON.parse(withoutFence.slice(start, end + 1));
    }
    throw new Error("API 返回内容不是可解析 JSON，请检查模型是否遵守输出格式。");
  }
}

async function fetchWithTimeout(url, options = {}, timeout = 12000) {
  const controller = new AbortController();
  const timer = window.setTimeout(() => controller.abort(), timeout);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    window.clearTimeout(timer);
  }
}

function formatGenerationError(error) {
  if (error?.name === "AbortError") {
    return "生成失败：API 请求超时。请检查网络、接口地址，或模型响应速度。";
  }
  const message = String(error?.message || error || "未知错误");
  if (/Failed to fetch|NetworkError|Load failed/i.test(message)) {
    return "生成失败：浏览器无法连接 API。常见原因是接口跨域限制、网络不可达或 API 地址填写错误。";
  }
  if (/JSON|解析|format|格式/i.test(message)) {
    return `生成失败：模型返回格式不符合剧情 JSON 结构。${message}`;
  }
  return `生成失败：${message}`;
}

function getApiTimeout() {
  const debugTimeout = new URLSearchParams(window.location.search).get("apiTimeout");
  const parsed = Number(debugTimeout);
  return Number.isFinite(parsed) && parsed >= 500 ? parsed : 12000;
}

function getModelsUrl(apiUrl) {
  const trimmed = apiUrl.trim();
  if (!trimmed) return "";
  try {
    const url = new URL(trimmed);
    url.pathname = url.pathname
      .replace(/\/chat\/completions\/?$/, "/models")
      .replace(/\/responses\/?$/, "/models");
    if (!/\/models\/?$/.test(url.pathname)) {
      url.pathname = url.pathname.replace(/\/$/, "") + "/models";
    }
    url.search = "";
    return url.toString();
  } catch {
    return trimmed.replace(/\/chat\/completions\/?$/, "/models").replace(/\/responses\/?$/, "/models");
  }
}

async function fetchAvailableModels() {
  syncApiFromInputs();
  if (!state.settings.apiUrl || !state.settings.apiKey) {
    showApiStatus("请先填写 API URL 和密钥。", "error");
    return;
  }
  showApiStatus("正在拉取模型...", "neutral");
  try {
    const response = await fetchWithTimeout(getModelsUrl(state.settings.apiUrl), {
      headers: { Authorization: `Bearer ${state.settings.apiKey}` }
    }, getApiTimeout());
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const models = (Array.isArray(data.data) ? data.data : [])
      .map((item) => item.id || item.name)
      .filter(Boolean);
    if (!models.length) throw new Error("没有返回模型列表");
    state.settings.apiModels = [...new Set(models)].sort();
    if (!state.settings.apiModel) state.settings.apiModel = state.settings.apiModels[0];
    els.apiModel.value = state.settings.apiModel;
    renderModelOptions();
    saveState();
    showApiStatus(`已拉取 ${state.settings.apiModels.length} 个模型。`, "ok");
  } catch (error) {
    showApiStatus("模型拉取失败，请检查 URL、密钥或服务是否支持 /models。", "error");
  }
}

async function testApiConnection() {
  syncApiFromInputs();
  if (!state.settings.apiUrl || !state.settings.apiKey || !state.settings.apiModel) {
    showApiStatus("请先填写 URL、密钥和模型。", "error");
    return;
  }
  showApiStatus("正在检验连接和剧情格式...", "neutral");
  try {
    const response = await fetchWithTimeout(state.settings.apiUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${state.settings.apiKey}`
      },
      body: JSON.stringify({
        model: state.settings.apiModel,
        messages: [
          {
            role: "system",
            content: "返回严格 JSON，不要 Markdown。结构必须是 {\"env\":{\"time\":\"傍晚\",\"place\":\"测试地点\",\"weather\":\"微风\"},\"blocks\":[{\"type\":\"paragraph\",\"text\":\"一句环境描写。\"}]}"
          },
          { role: "user", content: "剧情格式连接测试" }
        ],
        max_tokens: 180,
        temperature: 0,
        stream: false
      })
    }, getApiTimeout());
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const content = data.choices?.[0]?.message?.content || data.output_text || "";
    const parsed = parseApiJsonContent(content);
    if (!parsed?.env || !Array.isArray(parsed?.blocks)) {

    saveState();
    showApiStatus("连接成功，剧情格式也可用。", "ok");
  } catch (error) {
    showApiStatus(`检验失败：${formatGenerationError(error)}`, "error");
  }
}

function normalizeStory(story, previous, text, variant) {
  const safeEnv = {
    time: story?.env?.time || previous.env.time || "傍晚",
    place: story?.env?.place || previous.env.place || "未命名的地点",
    weather: story?.env?.weather || previous.env.weather || "微风"
  };
  const blocks = Array.isArray(story?.blocks) ? story.blocks : [];
  const normalizedBlocks = [];
  blocks.forEach((block) => {
    if (block.type === "dialogue") {
      const cleaned = cleanDialogueText(block.text || "");
      if (cleaned.aside) {
        normalizedBlocks.push({
          type: "paragraph",
          text: sanitizeNoPlayerControl(cleaned.aside)
        });
      }
      if (cleaned.line) {
        normalizedBlocks.push({
          type: "dialogue",
          speaker: String(block.speaker || chooseNpc(text, variant).name),
          text: sanitizeNoPlayerControl(cleaned.line)
        });
      }
      return;
    }
    normalizedBlocks.push({
      type: "paragraph",
      text: sanitizeNoPlayerControl(block.text || "")
    });
  });
  const filteredBlocks = normalizedBlocks.filter((block) => block.text.trim());

  if (!filteredBlocks.length) {
    throw new Error("API 返回内容为空或格式不符合要求，请调整模型输出格式。");
  }

  return { env: safeEnv, blocks: filteredBlocks };
}

function cleanDialogueText(text) {
  let raw = String(text || "").replace(/\s*\n+\s*/g, " ").trim();
  const quoted = raw.match(/[“"「『](.+?)[”"」』]/);
  if (quoted) {
    const line = quoted[1].trim();
    const aside = raw.replace(quoted[0], "").replace(/[（）()]/g, "").trim();
    return { line, aside };
  }
  const parts = raw
    .split(/(?<=[。！？!?])\s*/)
    .map((item) => item.trim())
    .filter(Boolean);
  const actionPattern = /(低头|抬头|皱眉|微笑|转身|走|伸手|握住|看向|望向|沉默|心想|想起|意识到|觉得|感觉|叹了口气|垂下|攥紧|靠近|退后|站起|坐下)/;
  const speechVerbs = /(说|说道|开口|低声|轻声|回答|问|提醒|喊|喃喃|冷声)/;
  const dialogueParts = parts.filter((part) => !actionPattern.test(part) || speechVerbs.test(part));
  const asideParts = parts.filter((part) => actionPattern.test(part) && !speechVerbs.test(part));
  const speechSource = dialogueParts[0] || raw;
  const line = speechSource
    .replace(/^(.*?(?:说|说道|开口|低声|轻声|回答|问|提醒|喊|喃喃|冷声)[：:])/, "")
    .replace(/[“”"「」『』]/g, "")
    .trim();
  return {
    line,
    aside: asideParts.filter((part) => part !== speechSource).join("")
  };
}

function sanitizeNoPlayerControl(text) {
  const playerName = getPlayerProfile().name.trim();
  const banned = [
    /你(走|跑|伸手|点头|摇头|回答|说道|决定|选择|拿起|放下|攻击|亲吻|拥抱|转身|离开|进入)/g,
    /你心想/g,
    /你意识到/g
  ];
  let result = String(text).replace(/\s*\n+\s*/g, " ");
  if (playerName) {
    result = result.replaceAll(playerName, "你");
  }
  banned.forEach((pattern) => {
    result = result.replace(pattern, "现场有人$1");
  });
  result = result.replace(/你(走|跑|伸手|点头|摇头|回答|说道|决定|选择|拿起|放下|攻击|亲吻|拥抱|转身|离开|进入)/g, "现场有人$1");
  result = result.replace(/你心想/g, "现场没有替主控写出内心独白");
  result = result.replace(/你意识到/g, "现场线索显示");
  return result.trim();
}

function chooseNpc(text, variant) {
  const savedNpcs = state.settings.npcs.filter((npc) => (npc.name || npc.detail || "").trim());
  const ambientNpcs = [
    { id: "ambient-clerk", name: "临时店员", gender: "未知", age: "未知", detail: "衣着整洁，神情克制，只在当前场景短暂出现。" },
    { id: "ambient-witness", name: "旁观者", gender: "未知", age: "未知", detail: "站在光线边缘，像是刚刚注意到异常动静。" },
    { id: "ambient-stranger", name: "陌生人", gender: "未知", age: "未知", detail: "轮廓在光线里并不清晰，但注意力始终停在当前事件上。" }
  ];
  const npcs = savedNpcs.length ? [...savedNpcs, ...ambientNpcs] : ambientNpcs;
  const npc = npcs[(text.length + variant) % npcs.length];
  return {
    id: npc.id || "default-npc",
    name: npc.name || "陌生人",
    age: npc.age || "未知",
    detail: npc.detail || "轮廓在光线里并不清晰，但注意力始终停在当前事件上。"
  };
}

function pick(list, seed) {
  return list[Math.abs(seed) % list.length];
}

function rebuildTimeline() {
  const snapshots = [];
  let snap = buildInitialSnapshot();
  state.events.forEach((event) => {
    if (event.type === "player") {
      snap = applyPlayerEvent(snap, event);
    } else if (event.type === "ai") {
      snap = applyAiEvent(snap, event);
    } else if (event.type === "memoryMerge") {
      snap = applyMemoryMergeEvent(snap, event);
    }
    snapshots.push(clone(snap));
  });
  state.snapshots = snapshots;
}

function applyPlayerEvent(snapshot, event) {
  const next = clone(snapshot);
  next.seed += 1;
  next.memories.instant.push({
    id: `mem-${event.id}`,
    sourceEventId: event.id,
    text: summarizeMemory(event.text)
  });
  next.statuses = (next.statuses || []).map((person, index) => ({
    ...person,
    posture: describeResponsivePosture(person.name, event.text, next.env, index),
    thought: buildThought(person, event.text, next.memories, next.seed + index),
    impression: buildImpression(person, event.text, next.seed + index)
  }));
  compactMemories(next);
  return next;
}

function applyAiEvent(snapshot, event) {
  const next = clone(snapshot);
  if (event.status === "loading" || event.status === "error") {
    return next;
  }
  next.seed += 1;
  next.env = event.story.env;
  const npc = chooseNpc(event.prompt || "", event.variant || 0);
  const existing = next.statuses.find((person) => person.id === npc.id || person.name === npc.name);
  const status = {
    id: npc.id,
    name: npc.name,
    detail: npc.detail || existing?.detail || "",
    age: npc.age || existing?.age || "未知",
    appearance: buildDynamicAppearance(npc, event.story.env, event.prompt || "", event.variant || 0),
    posture: describePosture(event.story.env, event.variant),
    thought: buildThought(npc, event.prompt || "", next.memories, event.variant),
    impression: buildImpression(npc, event.prompt || "", event.variant)
  };
  if (existing) Object.assign(existing, status);
  else next.statuses.push(status);

  const relation = next.relations.find((item) => item.id === npc.id || item.name === npc.name);
  const delta = event.source === "directive" ? 1 : Math.max(1, Math.min(6, (event.prompt || "").length % 7));
  if (relation) {
    relation.affection = clamp(Number(relation.affection || 0) + delta - (event.variant ? 1 : 0), -100, 100);
    relation.description = `经历当前事件后，${npc.name}对主控保持关注，态度受到最近记忆影响而继续变化。`;
  } else {
    next.relations.push({
      id: npc.id,
      name: npc.name,
      description: `已出场，正在根据主控的行动建立初步判断。`,
      affection: delta
    });
  }
  return next;
}

function applyMemoryMergeEvent(snapshot, event) {
  const next = clone(snapshot);
  const ids = new Set(event.memoryIds);
  const selected = [
    ...next.memories.instant.map((memory) => ({ ...memory, type: "instant" })),
    ...next.memories.long.map((memory) => ({ ...memory, type: "long" }))
  ].filter((memory) => ids.has(memory.id));
  if (!selected.length) return next;

  next.memories.instant = next.memories.instant.filter((memory) => !ids.has(memory.id));
  next.memories.long = next.memories.long.filter((memory) => !ids.has(memory.id));
  next.memories.long.push({
    id: event.id,
    sourceEventId: selected.at(-1).sourceEventId,
    text: event.text
  });
  return next;
}

function summarizeMemory(text) {
  const clean = text.replace(/\s+/g, " ").trim();
  return `主控推动了剧情：${clean.slice(0, 42)}${clean.length > 42 ? "..." : ""}`;
}

function compactMemories(snapshot) {
  while (snapshot.memories.instant.length >= 10) {
    const batch = snapshot.memories.instant.splice(0, 10);
    snapshot.memories.long.push({
      id: `long-auto-${batch.map((item) => item.sourceEventId).join("-")}`,
      sourceEventId: batch.at(-1).sourceEventId,
      text: `长期记忆：${batch.map((item) => item.text.replace(/^主控推动了剧情：/, "")).join("；").slice(0, 120)}`
    });
  }
}

function describePosture(env, variant) {
  const postures = [
    `站在${env.place}的边缘，身体微微侧向声源`,
    `停在可观察全局的位置，双手保持克制`,
    `靠近光线较亮的一侧，姿态紧张但没有逼近`,
    `半坐在附近的矮台边，视线仍追着关键线索`
  ];
  return postures[(env.place.length + variant) % postures.length];
}

function describeResponsivePosture(name, prompt, env, seed) {
  const postures = [
    `${name}微微调整站位，视线越过${env.place || "现场"}里最显眼的线索，没有贸然逼近你。`,
    `${name}停在离你不远不近的位置，肩线略收，像是在衡量刚才变化的分量。`,
    `${name}侧身靠近光线较稳的一侧，姿势克制，注意力仍落在现场异常处。`,
    `${name}放慢动作，身体重心略向后收，给当前局势留出继续发展的空隙。`
  ];
  return postures[(prompt.length + seed) % postures.length];
}

function buildDynamicAppearance(npc, env, prompt, variant) {
  const traits = extractAppearanceTraits(npc.detail || "");
  const hair = traits.hair ? `${traits.hair}${pick(["在光下显得柔软", "被空气带得微微凌乱", "贴着颊侧落下一点阴影"], prompt.length + variant)}` : "";
  const skin = traits.skin ? `${traits.skin}${pick(["被灯色衬出浅浅暖意", "在紧张气氛里显得更清冷", "因现场变化透出细微血色"], prompt.length + variant + 1)}` : "";
  const face = traits.face ? `${traits.face}${pick(["让神情显得更分明", "在侧光里轮廓清楚", "压住了多余情绪"], prompt.length + variant + 2)}` : "";
  const clothes = traits.clothes ? `${traits.clothes}${pick(["边缘沾着一点现场的光影", "随着动作出现细小褶皱", "让此人看起来仍保持克制"], prompt.length + variant + 3)}` : "";
  const picked = [hair, skin, face, clothes].filter(Boolean).slice(0, 3);
  if (picked.length) return picked.join("，") + "。";
  const fallback = npc.detail
    ? `外形从设定中自然提炼，只留下与${env.place || "当前场景"}相符的轮廓：神情、衣着和动作都随现场气氛略有变化。`
    : `轮廓在${env.place || "现场"}的光线里逐步清晰，神情克制，细节仍留给后续剧情展开。`;
  return fallback;
}

function extractAppearanceTraits(detail) {
  const text = String(detail || "");
  const hairMatch = text.match(/[^，。；、\s]{0,8}(?:黑|白|银|金|棕|褐|灰|红|粉|蓝|紫|栗|茶)[^，。；、\s]{0,8}(?:发|头发|卷发|卷毛|长发|短发|马尾|刘海)/);
  const skinMatch = text.match(/(?:白皮肤|白皙|冷白皮|小麦肤|肤色[^，。；、\s]{0,8}|皮肤[^，。；、\s]{0,8})/);
  const faceMatch = text.match(/(?:高鼻梁|鼻梁[^，。；、\s]{0,8}|眼睛[^，。；、\s]{0,8}|眉眼[^，。；、\s]{0,8}|薄唇|唇色[^，。；、\s]{0,8}|脸[^，。；、\s]{0,8}|轮廓[^，。；、\s]{0,8})/);
  const clothesMatch = text.match(/(?:穿着|身穿|衣着|制服|长裙|衬衫|外套|风衣|披肩|靴子|手套)[^，。；、\s]{0,14}/);
  return {
    hair: hairMatch?.[0] || "",
    skin: skinMatch?.[0] || "",
    face: faceMatch?.[0] || "",
    clothes: clothesMatch?.[0] || ""
  };
}

function buildThought(person, prompt, memories, variant) {
  const name = typeof person === "string" ? person : person.name;
  const detail = typeof person === "string" ? "" : person.detail || "";
  const personality = extractPersonalityTone(detail);
  const recent = memories.instant.at(-1)?.text || memories.long.at(-1)?.text || "还没有足够多的共同经历";
  const focus = prompt.replace(/\s+/g, "").slice(0, 18) || "新的变化";
  const tones = [
    `${name}不愿轻易下结论，注意力会先落在你下一步关注的位置；${personality}让这个判断保持克制。`,
    `${name}正在重新评估你与现场异常之间的关系，但还不会把话说满；${personality}使其更倾向保留余地。`,
    `${name}察觉局势偏离原本预想，于是把更多判断压在心里；${personality}让此人避免贸然越界。`,
    `${name}对你的目的多了一层推测，却还不适合直接表态；${personality}会影响下一次开口的分寸。`
  ];
  return `围绕“${focus}”，${name}会把眼前线索与最近经历联系起来。${recent} ${tones[(focus.length + variant) % tones.length]}这种内在判断会影响其下一次开口、站位和是否愿意透露更多信息。`;
}

function buildImpression(person, prompt, variant) {
  const detail = typeof person === "string" ? "" : person.detail || "";
  const personality = extractPersonalityTone(detail);
  const impressions = [
    `对你保持谨慎好奇，觉得你值得继续观察，但会按${personality}控制距离。`,
    `对你略有戒备，但还没有关闭交流可能，尤其会留意你是否尊重边界。`,
    `觉得你让局势变得复杂，因此更关注你的下一步选择，而不是立刻信任或否定。`,
    `对你的目的产生新的兴趣，同时仍在保留判断，不会突然做出夸张反应。`,
    `认为你没有轻易打破边界，所以愿意暂时维持合作距离。`
  ];
  return impressions[(prompt.length + variant) % impressions.length];
}

function extractPersonalityTone(detail) {
  const text = String(detail || "");
  const traits = [];
  if (/克制|冷静|沉稳|理性|谨慎/.test(text)) traits.push("克制谨慎的性格");
  if (/敏锐|聪明|洞察|观察/.test(text)) traits.push("敏锐的观察习惯");
  if (/温柔|体贴|柔和/.test(text)) traits.push("温和的处事方式");
  if (/傲慢|高傲|嘴硬|毒舌/.test(text)) traits.push("不愿轻易示弱的习惯");
  if (/胆小|怯懦|不安|紧张/.test(text)) traits.push("容易不安的本能");
  if (/忠诚|守序|正直/.test(text)) traits.push("重视原则的底线");
  return traits[0] || "既有设定中的性格底色";
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function askActionConfirm({ title, text, danger = true }) {
  return new Promise((resolve) => {
    pendingConfirm = resolve;
    els.actionConfirmTitle.textContent = title;
    els.actionConfirmText.textContent = text;
    els.actionConfirmOk.classList.toggle("danger-button", danger);
    els.actionConfirmOk.classList.toggle("send-button", !danger);
    show(els.actionConfirmModal);
  });
}

async function deleteEvent(id) {
  const index = state.events.findIndex((event) => event.id === id);
  if (index < 0) return;
  state.events = state.events.slice(0, index);
  rebuildTimeline();
  renderAll();
}

async function rerollAi(id) {
  const index = state.events.findIndex((event) => event.id === id);
  const event = state.events[index];
  if (!event || event.type !== "ai") return;
  const baseEvents = state.events.slice(0, index);
  const previousPlayer = [...baseEvents].reverse().find((item) => item.type === "player");
  const prompt = previousPlayer?.text || event.prompt || "";
  const replacement = {
    ...event,
    id: uid("ai"),
    prompt,
    source: event.source,
    variant: (event.variant || 0) + 1,
    status: "loading",
    story: {
      env: { time: "生成中", place: "剧情引擎", weather: "等待" },
      blocks: [{ type: "paragraph", text: "正在输入中……" }]
    },
    createdAt: Date.now()
  };
  state.events = [...baseEvents, replacement];
  rebuildTimeline();
  renderAll();
  scheduleAiResolution(replacement.id);
}

async function savePlayerEdit(id, text) {
  const index = state.events.findIndex((event) => event.id === id);
  if (index < 0) return;
  state.events[index].text = text.trim();
  state.events = state.events.slice(0, index + 1);
  const aiEvent = createPendingAiEvent({ source: "player", text: state.events[index].text });
  state.events.push(aiEvent);
  rebuildTimeline();
  renderAll();
  scheduleAiResolution(aiEvent.id);
}

async function saveAiEdit(id, text) {
  const index = state.events.findIndex((event) => event.id === id);
  if (index < 0) return;
  const previous = index > 0 ? state.snapshots[index - 1] || buildInitialSnapshot() : buildInitialSnapshot();
  state.events[index].story = normalizeStory(parseEditedAiText(text, state.events[index].story.env), previous, state.events[index].prompt || "", state.events[index].variant || 0);
  state.events = state.events.slice(0, index + 1);
  rebuildTimeline();
  renderAll();
}

function parseEditedAiText(text, fallbackEnv) {
  const lines = text.split("\n").map((line) => line.trim()).filter(Boolean);
  const envLine = lines.find((line) => line.includes("时间：") && line.includes("地点：") && line.includes("天气："));
  const env = envLine ? {
    time: envLine.match(/时间：([^ ]+)/)?.[1] || fallbackEnv.time,
    place: envLine.match(/地点：([^ ]+)/)?.[1] || fallbackEnv.place,
    weather: envLine.match(/天气：([^ \]]+)/)?.[1] || fallbackEnv.weather
  } : fallbackEnv;

  const body = lines.filter((line) => !line.startsWith("---") && !line.includes("时间：") && !line.startsWith("[删除]"));
  const blocks = body.map((line) => {
    const dialogue = line.match(/^\[对话方框 - (.+?)\]\s*"?(.+?)"?$/);
    if (dialogue) {
      const cleaned = cleanDialogueText(dialogue[2]);
      return { type: "dialogue", speaker: dialogue[1], text: cleaned.line };
    }
    return { type: "paragraph", text: line };
  });
  return { env, blocks };
}

function formatAiForEdit(event) {
  const body = event.story.blocks.map((block) => {
    if (block.type === "dialogue") return `[对话方框 - ${block.speaker}] "${block.text}"`;
    return block.text;
  }).join("\n\n");
  return `---美化信息条---\n[时间：${event.story.env.time} 地点：${event.story.env.place} 天气：${event.story.env.weather}]\n---剧情正文---\n${body}\n---按钮栏---\n[删除] [重说] [修改]`;
}

function openEdit(kind, id) {
  const event = state.events.find((item) => item.id === id);
  if (!event) return;
  editContext = { kind, id };
  els.editTitle.textContent = kind === "player" ? "修改玩家消息" : "修改 AI 输出";
  els.editInput.value = kind === "player" ? event.text : formatAiForEdit(event);
  show(els.editModal);
  els.editInput.focus();
}

function show(el) {
  el.hidden = false;
  el.classList.remove("hidden");
}

function hide(el) {
  el.classList.add("hidden");
  el.hidden = true;
}

function setSidebarMode(mode) {
  const alreadyOpen = els.sideDrawer.classList.contains("panel-open") && state.sidebarMode === mode;
  state.sidebarMode = mode;
  renderSidebar();
  setSidebarOpen(true);
  els.sideDrawer.classList.toggle("panel-open", !alreadyOpen);
  saveState();
}

function setSidebarOpen(open) {
  els.sideDrawer.classList.toggle("open", open);
  els.drawerToggle.setAttribute("aria-expanded", String(open));
  if (!open) {
    els.sideDrawer.classList.remove("panel-open");
    els.sideDrawer.style.removeProperty("--drag-x");
  }
}

function setupDraggableSidebar() {
  let startX = 0;
  let currentX = 0;
  let dragging = false;
  let moved = false;

  const openWidth = () => window.innerWidth <= 540 ? 96 : 104;
  const closedPeek = () => window.innerWidth <= 540 ? 30 : 34;
  const maxDrag = () => openWidth() - closedPeek();

  const pointerX = (event) => event.touches?.[0]?.clientX ?? event.clientX ?? 0;

  const begin = (event) => {
    dragging = true;
    moved = false;
    startX = pointerX(event);
    currentX = els.sideDrawer.classList.contains("open") ? maxDrag() : 0;
    els.sideDrawer.classList.add("dragging");
  };

  const move = (event) => {
    if (!dragging) return;
    const delta = pointerX(event) - startX;
    const next = clamp(currentX + delta, 0, maxDrag());
    if (Math.abs(delta) > 4) moved = true;
    els.sideDrawer.style.setProperty("--drag-x", `${next}px`);
    event.preventDefault();
  };

  const end = () => {
    if (!dragging) return;
    dragging = false;
    els.sideDrawer.classList.remove("dragging");
    const value = Number.parseFloat(els.sideDrawer.style.getPropertyValue("--drag-x")) || 0;
    if (!moved) {
      setSidebarOpen(!els.sideDrawer.classList.contains("open"));
      return;
    }
    setSidebarOpen(value > maxDrag() * 0.45);
    els.sideDrawer.style.removeProperty("--drag-x");
  };

  els.drawerToggle.addEventListener("pointerdown", begin);
  window.addEventListener("pointermove", move, { passive: false });
  window.addEventListener("pointerup", end);
  window.addEventListener("pointercancel", end);

  els.drawerToggle.addEventListener("touchstart", begin, { passive: true });
  window.addEventListener("touchmove", move, { passive: false });
  window.addEventListener("touchend", end);
  window.addEventListener("touchcancel", end);
}

function bindEvents() {
  els.inputForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const text = els.playerInput.value;
    els.playerInput.value = "";
    await submitPlayerText(text);
  });

  els.playerInput.addEventListener("input", () => {
    els.playerInput.style.height = "auto";
    els.playerInput.style.height = `${Math.min(160, els.playerInput.scrollHeight)}px`;
  });

  els.chatLog.addEventListener("click", async (event) => {
    if (els.sideDrawer.classList.contains("panel-open")) {
      els.sideDrawer.classList.remove("panel-open");
    }
    const button = event.target.closest("button[data-action]");
    if (!button) return;
    const id = button.dataset.id;
    const action = button.dataset.action;
    if (action === "delete-player" || action === "delete-ai") {
      const ok = await askActionConfirm({
        title: "确认删除",
        text: "删除后，这条消息之后的剧情、记忆、人物状态和关系都会一起回溯。"
      });
      if (ok) await deleteEvent(id);
    }
    if (action === "reroll-ai") {
      const ok = await askActionConfirm({
        title: "确认重说",
        text: "重说会根据上一条有效玩家消息重新生成此处之后的剧情，并同步刷新记忆和侧边信息。",
        danger: false
      });
      if (ok) await rerollAi(id);
    }
    if (action === "edit-player") openEdit("player", id);
    if (action === "edit-ai") openEdit("ai", id);
  });

  els.directiveButton.addEventListener("click", () => show(els.directiveModal));
  els.directiveCancel.addEventListener("click", () => hide(els.directiveModal));
  els.directiveSend.addEventListener("click", async () => {
    const text = els.directiveInput.value;
    els.directiveInput.value = "";
    hide(els.directiveModal);
    await submitDirective(text);
  });

  setupDraggableSidebar();
  els.statusModeButton.addEventListener("click", () => setSidebarMode("status"));
  els.relationModeButton.addEventListener("click", () => setSidebarMode("relation"));
  els.fullscreenButton.addEventListener("click", async () => {
    const root = document.documentElement;
    try {
      if (!document.fullscreenElement && root.requestFullscreen) {
        await root.requestFullscreen();
        els.fullscreenButton.textContent = "退出";
      } else if (document.exitFullscreen) {
        await document.exitFullscreen();
        els.fullscreenButton.textContent = "全屏";
      }
    } catch {
      els.fullscreenButton.textContent = "全屏";
    }
  });
  document.addEventListener("fullscreenchange", () => {
    els.fullscreenButton.textContent = document.fullscreenElement ? "退出" : "全屏";
  });
  els.memoryButton.addEventListener("click", () => {
    renderMemoryPage();
    show(els.memoryPage);
  });
  els.homeButton.addEventListener("click", () => {
    renderHome();
    show(els.homePage);
  });

  document.querySelectorAll("[data-close-page]").forEach((button) => {
    button.addEventListener("click", () => hide(document.getElementById(button.dataset.closePage)));
  });

  els.memoryFilter.addEventListener("change", renderMemoryPage);
  els.memoryList.addEventListener("change", (event) => {
    const id = event.target.dataset.memoryId;
    if (!id) return;
    if (event.target.checked) state.selectedMemories.push(id);
    else state.selectedMemories = state.selectedMemories.filter((item) => item !== id);
    saveState();
  });

  els.mergeMemoryButton.addEventListener("click", mergeSelectedMemories);
  els.addNpcButton.addEventListener("click", () => {
    state.settings.npcs.push({ id: uid("npc"), name: "", gender: "", age: "", detail: "" });
    renderHome();
    saveState();
  });

  els.npcList.addEventListener("input", (event) => {
    const card = event.target.closest(".npc-card");
    const field = event.target.dataset.npcField;
    if (!card || !field) return;
    const npc = state.settings.npcs.find((item) => item.id === card.dataset.id);
    if (npc) npc[field] = event.target.value;
    saveState();
  });

  els.npcList.addEventListener("click", (event) => {
    const button = event.target.closest("[data-action='remove-npc']");
    if (!button) return;
    state.settings.npcs = state.settings.npcs.filter((npc) => npc.id !== button.dataset.id);
    rebuildTimeline();
    renderAll();
  });

  els.saveHomeButton.addEventListener("click", () => {
    saveSection("all");
    showApiStatus("全部设置已保存。", "ok");
  });

  els.saveWorldButton.addEventListener("click", () => saveSection("world"));
  els.saveCharacterButton.addEventListener("click", () => saveSection("character"));
  els.saveApiButton.addEventListener("click", () => saveSection("api"));
  els.fetchModelsButton.addEventListener("click", fetchAvailableModels);
  els.testApiButton.addEventListener("click", testApiConnection);

  [els.worldSetting, els.playerName, els.playerGender, els.playerAge, els.playerDetail, els.apiUrl, els.apiKey, els.apiModel].forEach((input) => {
    input.addEventListener("change", () => {
      syncAllSettingsFromInputs();
      saveState();
    });
  });

  els.resetButton.addEventListener("click", () => show(els.confirmModal));
  els.resetCancel.addEventListener("click", () => hide(els.confirmModal));
  els.resetConfirm.addEventListener("click", () => {
    state = clone(defaultState);
    localStorage.removeItem(STORAGE_KEY);
    hide(els.confirmModal);
    renderAll();
  });

  els.actionConfirmCancel.addEventListener("click", () => {
    hide(els.actionConfirmModal);
    pendingConfirm?.(false);
    pendingConfirm = null;
  });

  els.actionConfirmOk.addEventListener("click", () => {
    hide(els.actionConfirmModal);
    pendingConfirm?.(true);
    pendingConfirm = null;
  });

  els.editCancel.addEventListener("click", () => hide(els.editModal));
  els.editSave.addEventListener("click", async () => {
    const text = els.editInput.value;
    hide(els.editModal);
    if (!editContext || !text.trim()) return;
    if (editContext.kind === "player") await savePlayerEdit(editContext.id, text);
    else await saveAiEdit(editContext.id, text);
    editContext = null;
  });
}

function mergeSelectedMemories() {
  const snap = latestSnapshot();
  const selected = [
    ...snap.memories.instant.map((memory) => ({ ...memory, type: "instant" })),
    ...snap.memories.long.map((memory) => ({ ...memory, type: "long" }))
  ].filter((memory) => state.selectedMemories.includes(memory.id));
  if (!selected.length) return;

  state.events.push({
    id: uid("long"),
    type: "memoryMerge",
    memoryIds: selected.map((item) => item.id),
    text: `手动整合：${selected.map((item) => item.text.replace(/^长期记忆：/, "").replace(/^主控推动了剧情：/, "")).join("；").slice(0, 140)}`,
    createdAt: Date.now()
  });
  state.selectedMemories = [];
  rebuildTimeline();
  renderAll();
}

window.addEventListener("beforeunload", saveState);

rebuildTimeline();
bindEvents();
renderAll();
</script>
